<h4>Listado</h4>
<ul class="list-group">
  <li class="list-group-item" *ngFor="let character of characterList;
  index as i;
  first as isFirst;
  last as isLast;
  even as isEven;
  odd as isOdd
  " [ngClass]="{
    'list-group-item-dark' : isLast,
    'list-group-item-primary' : isEven,
    'list-group-item-danger': isOdd
  }">
    <div class="row">
      <div class="col-md-1 d-flex align-items-center">
        <span class="text-primary">{{i + 1}}. </span>
      </div>
      <div class="col-md-4 d-flex align-items-center">
        <span>{{character.nameCharacter}}</span>
      </div>
      <div class="col-md-4 d-flex align-items-center">
        <strong>Power : </strong>
        <span>{{character.powerCharacter}}</span>
      </div>
      <div class="col-md-3 d-flex align-items-center">
        <button class="btn btn-danger" (click)="onDeleteCharacter(character)">X</button>
      </div>
    </div>
  </li>
</ul>
